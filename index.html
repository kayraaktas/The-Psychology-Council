<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="AI Psychology Council - Powered by the world's largest psychology library for philosophical and psychological awareness.">
    <meta name="theme-color" content="#f5f7fa">
    
    <title>AI Psychology Council | Global Support</title>
    
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    
    <style>
        /* CSS DEĞİŞKENLERİ (VARIABLES) */
        :root {
            --bg-gradient-start: #f5f7fa;
            --bg-gradient-end: #c3cfe2;
            --text-heading: #2c3e50;
            --text-secondary: #7f8c8d;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* N8N CHAT UI TAM EKRAN (FULLSCREEN) YÜKSELTMESİ */
            --chat--message--font-size: 1.1rem;
            --chat--message--line-height: 1.7;
            --chat--message--color: #2d3748;
            --chat--window--width: 100vw;
            --chat--window--height: 100vh;
            --chat--window--margin: 0;
            --chat--window--border-radius: 0;
            --chat--message--bot--background: #ffffff;
            --chat--message--user--background: #f1f5f9;
            --chat--header--background: #ffffff;
            --chat--header--color: #1e293b;
            --chat--header--border-bottom: 1px solid #e2e8f0;
            --chat--toggle--background: transparent;
            --chat--toggle--display: none; /* Düğmeyi gizle, hep açık yap */
        }

        /* TEMEL GÖVDE AYARLARI */
        body {
            background-color: var(--bg-gradient-start);
            font-family: var(--font-main);
            margin: 0;
            padding: 0; 
            overflow: hidden; /* Tam ekranda kaydırma çubuklarını gizler */
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* VİTRİN BİLGİ ALANI (Sadece yüklenirken görünür, chat üstüne biner) */
        .splash-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 0; /* Chat penceresi bunun üstüne çıkacak */
            width: 80%;
            max-width: 600px;
        }

        .splash-screen h1 {
            color: var(--text-heading);
            font-size: 2.5em;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .splash-screen p {
            color: var(--text-secondary);
            font-size: 1.2em;
            line-height: 1.6;
        }

        /* N8N CHAT YÜZEYİNİ EZEN CSS */
        .chat-window {
            box-shadow: none !important;
            border: none !important;
        }
    </style>
</head>
<body>

    <div class="splash-screen">
        <h1>The Psychology Council</h1>
        <p>Your dedicated AI expert in philosophy and psychology.</p>
    </div>

    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        const uniqueSessionId = 'session_' + Math.random().toString(36).substring(2, 15);

        createChat({
            webhookUrl: 'https://159.89.8.89.sslip.io/webhook/chat',
            webhookConfig: {
                method: 'POST',
                headers: {}
            },
            mode: 'window', // Tam ekranı CSS ile zorlayacağımız için window yeterli
            showWelcomeScreen: true,
            metadata: {
                sessionId: uniqueSessionId
            },
            i18n: {
                en: {
                    title: 'The Psychology Council',
                    subtitle: 'Powered by DeepSeek & Pinecone | Zero-Logging Active',
                    getStarted: 'Start Consultation',
                    inputPlaceholder: 'The Council is consulting the library...',
                }
            },
            initialMessages: [
                "Hello. I am the Psychology Council. How can I guide you today?"
            ]
        });

        // Chat widget yüklendikten sonra otomatik açık kalmasını sağla
        setTimeout(() => {
            const chatToggle = document.querySelector('.chat-toggle');
            if(chatToggle) {
                // Widget'i açmak için tıkla
                chatToggle.click();
            }
        }, 500);
    </script>
</body>
</html>
